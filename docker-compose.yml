version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ── Django API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000
             --workers 4 --timeout 120 --access-logfile - --error-logfile -"
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    environment:
      SECRET_KEY: django-secret-key-change-in-production
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@db:5432/ecommerce_db
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "60"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - media_files:/app/media
    environment:
      SECRET_KEY: django-secret-key-change-in-production
      DEBUG: "False"
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@db:5432/ecommerce_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - api

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      SECRET_KEY: django-secret-key-change-in-production
      DEBUG: "False"
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@db:5432/ecommerce_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - celery_worker

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
